{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card p-4 shadow">

            <h2 class="mb-4">Register</h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-primary">

                    Register
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
