{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow border-0 p-5 text-center">

            <!-- PROFILE IMAGE -->

            <img src="{{ profile.profile_image.url }}"
                 class="rounded-circle mx-auto mb-4"
                 width="150"
                 height="150"
                 style="object-fit:cover;">

            <h3>
                {{ request.user.username }}
            </h3>

            <hr>

            <table class="table">

                <tr>
                    <th>Full Name</th>
                    <td>{{ profile.full_name }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ request.user.email }}</td>
                </tr>

                <tr>
                    <th>Phone</th>
                    <td>{{ profile.phone }}</td>
                </tr>

                <tr>
                    <th>Address</th>
                    <td>{{ profile.address }}</td>
                </tr>

            </table>

            <div class="mt-3">

                <a href="{% url 'edit_profile' %}"
                   class="btn btn-primary">

                    Edit Profile
                </a>

                <a href="{% url 'delete_account' %}"
                   class="btn btn-danger">

                    Delete Account
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
