{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow">

    <h3>Are you sure you want to delete?</h3>

    <form method="POST">

        {% csrf_token %}

        <button type="submit"
                class="btn btn-danger">

            Yes Delete
        </button>

        <a href="/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
