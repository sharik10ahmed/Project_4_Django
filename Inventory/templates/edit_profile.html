{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow border-0 p-4">

            <h2 class="mb-4 text-center">
                Edit Profile
            </h2>

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-success w-100">

                    Save Changes
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
